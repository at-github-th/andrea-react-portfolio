<!DOCTYPE html>
<html>
<head>
<style>
#logs {
    text-align: left;
    color: #00C669;
}    
.metadata info,
.note {
    text-align: left;
    font-size: 20px;
}
.header {
    font-weight: 600;
    text-transform: uppercase;
}
.data {
    font-weight: 300;
    margin-left: 7px;
    text-transform: none;
}
.note {
    margin-top: 20px;
    font-style: italic;
}
.audio-img {
    height: auto;
    width: 480px;
}
@media screen and (max-width: 600px) {
    .audio-img {
        width: 100%;
    }
}
</style>
</head>
<body>
<script src="//content.jwplatform.com/libraries/ElBXYHpj.js"></script>

<img id="image" class="audio-img" />
<div id="player"></div>

<div class="metadata-info">
    <div class="header">
        Title: <span class="data" id="Title"></span>
    </div>
    <div class="header">
        Artist: <span class="data" id="Arist"></span>
    </div>
</div>

<div class="note">
    * Note that an HLS stream <strong>must</strong> include timed metadata in order to achieve this behavior.
</div>

<script type="text/javascript">

    var titleDiv = document.getElementById('title');
    var artistDiv = document.getElementById('artist');
    var imageDiv = document.getElementById('image');
    var player = jwplayer('player');

// Set up the player with an HLS stream that includes timed metadata
player.setup({
    file: 'assets/index.m3u8'
});

// Retrieve metadata
player.on('meta', function(e) {
    if (e.metadata) {
        var title = e.metadata.title;
        var artist = e.metadata.artist;
        var imageUrl = e.metadata.url;

        title ? titleDiv.innerHTML = title : titleDiv.innerHTML = 'Unknown';
        artist ? artistDiv.innerHTML = artist : artistDiv.innerHTML = 'Unknown';
        imageUrl ? imageDiv.src = imageUrl : imageDiv.src = 'assets/jwlogo.png';
    };
});

// Handle reset of player at the end of content
player.on('error', function(e) {
    if (e.message === 'The live stream is either down or has ended') {
        player.load({
            file: 'assets/index.m3u8'
        });
    }
});

</script>


</body>
</html>
