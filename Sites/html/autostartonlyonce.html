<!DOCTYPE html>
<html>
    <head>
        <style>
        .refresh {
            height: 15px;
            width: 30px;
            color: blue;
        }
        .clear-storage {
            height: 15px;
            width: 30px;
            color: red;
        }
        </style>
    </head>
    <body>
        <script src="//content.jwplatform.com/libraries/Jq6HIbgz.js"></script>
        <div id="player"></div>
        <button class="button button-sm button theme-brand-1 refresh">Refresh Page</button>
        <button class="button button-sm button theme-brand-2 clear-storage">Clear Local Storage</button>
        <script type="text/javascript">
        var pageReloaded = JSON.parse(localStorage.getItem('jwplayer.page-reloaded'));
        var player = jwplayer('player').setup ({
            playlist: 'https://cdn.jwplayer.com/v2/media/tkM1zvBq',
            // Do not autostart if the page was reloaded.
            autostart: pageReloaded ? !pageReloaded : true
        });
        localStorage.setItem('jwplayer.page-reloaded', true);
        </script>
        <script>
        (function() {
            'use strict';
            var refreshBtn = document.querySelector('.refresh');
            var clearStorageBtn = document.querySelector('.clear-storage');

            refreshBtn.addEventListener('click', function() {
                window.location.reload();
            });

            clearStorageBtn.addEventListener('click', function() {
                delete localStorage['jwplayer.page-reloaded'];
                window.location.reload();
            });
        }());
        </script>

    </body>
</html>
