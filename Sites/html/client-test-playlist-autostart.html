  <body>
    <div id="player"></div>
    <script type="text/javascript">

      let player = jwplayer('player');
      let player_flag = true;
       
      player.setup({
        "width": "100%",
        "aspectratio": "16:9",
        "file" : "https://cdn.jwplayer.com/manifests/M4kyG3Cf.m3u8",
         "autostart" : true
      });
      
      player.on('playlistItem', (data) => {
        //$("#video_title").html(data.item.title);
        //$("#video_desc").html(data.item.description);
        //player.play()
      });
      
      player.on('complete', function(){
        if(player_flag){  
            player.load("https://cdn.jwplayer.com/v2/playlists/2qcTPEiP");
            //$(".rlt_vid_cat_link").html("");
            player_flag = false;
        }    
      });
      
    </script>
