<html>

<head>
    <script type="text/javascript" src="https://content.jwplatform.com/libraries/Fp2hXm3I.js"></script>
</head>

<body>
    <div id="player"></div>
    <h2>Thumbnails</h2>
    <p>This will append a new list item with the thumbnail URL on every playlist item</p>
    <ul id="tracksList"></ul>
    <script>

        const trackTarget = document.getElementById("tracksList");

        jwplayer("player").setup({
            "playlist": [
                {
                    "file": "https://content.jwplatform.com/videos/lqDCdcgx-vKyQERDm.mp4",
                    "image": "https://content.jwplatform.com/thumbs/lqDCdcgx-320.jpg ",
                    "title": "getPlaylistItems - Thumbnails",
                    "description": "Get autogenerated thumbnails with API call.",
                    "tracks": [{
                        "file": "https://cdn.jwplayer.com/strips/lqDCdcgx-120.vtt",
                        "kind": "thumbnails"
                    }],
                },
            ],
            "height": 360,
            "width": 640,
        });

        jwplayer("player").on('playlistItem', () => {
            jwplayer().getPlaylistItem().tracks.forEach(track => {
                if (track.kind === "thumbnails") {
                    listTrack(track.file)
                }
            });
        });

        function listTrack(file) {
            const newLineItem = document.createElement("li");
            newLineItem.textContent = file;
            trackTarget.appendChild(newLineItem);
        }

    </script>
</body>

</html>
