<html>
<head>
    <style type="text/css">
#adplayer {
    padding: 0;
    display: inline-flex;
  }

#timeline {
    position: relative;
    margin: 0 auto;
    padding-bottom: 30px;
  }

#highlight {
    transition: width 0.25s;
    position: absolute;
    left: 40px;
    top: 0;
    height: 50px;
    width: 0;
    background: transparent url('../images/highlight.png') 0 0 no-repeat;
  }
  </style>
</head>

<body>
<script src="//content.jwplatform.com/libraries/lqsWlr4Z.js"></script>

<div id="adplayer">
  <div id="player"></div>
  <div id="adrectangle"></div>
</div>
<div id="timeline">
    <img src="../images/timeline.png" alt="Ad Scheduling Timeline"/>
    <div id="highlight"></div>
</div>

<script>
    
jwplayer("player").setup({
  playlist: 'https://cdn.jwplayer.com/v2/media/q1fx20VZ',
  advertising: {
    client: "vast",
    companiondiv: { id: "adrectangle", height: 250, width: 300 },
    schedule: "../assets/vmap.xml"
  },
  width: 592,
  height: 333
});

jwplayer().on('time', function(event){
  var p = event.position;
  var w;
  if(p < 300) {
    w = 42 + p/300*124;
  } else if (p > 301 && p < 600) {
    w = 234 + (p-300)/300*124;
  } else if (p > 601) {
    w = 426 + (p-600)/288*124;
  }
  document.getElementById("highlight").style.width = w + "px";
});

jwplayer().on('adTime', function(event) {
  var t = event.tag.substr(-3);
  var p = event.position;
  var s = event.sequence;
  var w = 0;
  if(t == "pre") {
    w = p/30*40;
  } else if (t == "mr1") {
    w = 146 + s*22 + p/10*22;
  } else if (t == "mr2") {
    w = 338 + s*22 + p/10*22;
  } else if (t == "pst" ) {
    w = 552 + p/30*40;
  }
  document.getElementById("highlight").style.width = w + "px";
});

    </script>
</body>
</html>
